<!DOCTYPE html>
<html lang="pt-br">
<head>
<title>Formulário html</title>
<meta charset="UTF-8">
</head>

<body>
    <h1>Cadastro de Usuário</h1>
    <form action="Cadastro.php" method="get">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">
        <br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email">
        <br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha">
        <br>
        <label for="idade">E-mail:</label>
        <input type="number" id="idade" name="idade">
        <br>
        <label for="data">Data de nascimento:</label>
        <input type="date" id="nascimento" name="datanascimento">
        <br>
        <p>Turno:</p>
        <input type="radio" name="turno" id="manha"> <label for="manha">Manhã</label>
        <input type="radio" name="turno" id="tarde"> <label for="tarde">Tarde</label>
        <input type="radio" name="turno" id="noite"> <label for="noite">Noite</label>
        <br>
        <p>Áreas de interesse</p>
        <input type="checkbox" name="area" id="programacao"><label for="programacao">programacao</label>
        <input type="checkbox" name="area" id="design"> <label for="design">design</label>
        <input type="checkbox" name="area" id="redes"> <label for="redes">redes</label>
        <br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
</body>
